<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¿Qué significa?</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: white;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Ferdig-tekst */
#done {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 48px;
    font-weight: bold;
}

/* Restart-knapp */
#restartBtn {
    position: fixed;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    font-size: 18px;
    display: none;
    z-index: 1000;
}



.container {
    position: relative;
}



#box {
    position: relative;
    z-index: 2;
    background: white;
    padding: 20px;
    max-width: 460px;
    width: 100%;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.side-image {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 330px;
    z-index: 1; /* bak boksen */
    pointer-events: none;
}

.side-image.left {
    left: -340px;
}

.side-image.right {
    right: -380px;
}


#levels {
    margin-bottom: 20px;
}

#levels button {
    margin-right: 10px;
    padding: 10px;
}

input {
    padding: 8px;
    width: 100%;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
}

#feedback {
    margin-top: 10px;
    font-weight: bold;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<header>
    <h1 id="done"></h1>
    <button id="restartBtn" onclick="restartGame()">Jugar de nuevo</button>
</header>


<div class="container">
    <img src="hablar1.jpg" class="side-image left" alt="">
    <img src="hablar2.jpg" class="side-image right" alt="">

    <div id="box">
 

    <a href="https://olemunthe.github.io/aprendeEspanol/">Volver a la página principal</a>

    <h2>¿Qué significa?</h2>
    <p>Escribe la palabra/la frase en español (sin mayúsculas)</p>

    <p id="question"><strong>Elige cuántas palabras</strong></p>

    <div id="levels">
        <button onclick="startGame(10)">10 palabras</button>
        <button onclick="startGame(20)">20 palabras</button>
        <button onclick="startGame(30)">30 palabras</button>
    </div>

    <input type="text" id="answer" placeholder="Tu respuesta">
    <button onclick="checkAnswer()">Responder</button>

    <p id="feedback" style="color:red;"></p>
    <p id="stats"></p>
    <p id="final"></p>
</div>
</div>

<script>
let allWords = [
["jeg snakker med han/henne", 		"le hablo"],
["vi snakker med han/henne", 		"le hablamos"],
["du snakker med han/henne", 		"le hablas"],
["dere snakker med han/henne", 		"le habláis"],
["han/hun snakker med han/henne", 	"le habla"],
["de snakker med han/henne", 		"le hablan"],

["jeg snakket med han/henne (spesikt tidspunkt)", 		"le hablé"],
["vi snakket med han/henne (spesikt tidspunkt)", 		"le hablemos"],
["du snakket med han/henne (spesikt tidspunkt)", 		"le hablaste"],
["dere snakket med han/henne (spesikt tidspunkt)", 		"le hablasteis"],
["han/hun snakket med han/henne (spesikt tidspunkt)", 	"le habló"],
["de snakket med han/henne (spesikt tidspunkt)", 		"le hablaron"],

["jeg snakket med han/henne (pleide å snakke)", 		"le hablaba"],
["vi snakket med han/henne (pleide å snakke)", 		"le hablábamos"],
["du snakket med han/henne (pleide å snakke)", 		"le hablabas"],
["dere snakket med han/henne (pleide å snakke)", 		"le hablabais"],
["han/hun snakket med han/henne (pleide å snakke)", 	"le hablaba"],
["de snakket med han/henne (pleide å snakke)", 		"le hablaban"],

["jeg snakker med han/henne (i framtiden)", 		"le hablaré"],
["vi snakker med han/henne (i framtiden)", 		"le hablaremos"],
["du snakker med han/henne (i framtiden)", 		"le hablarás"],
["dere snakker med han/henne (i framtiden)", 		"le hablaréis"],
["han/hun snakker med han/henne (i framtiden)", 	"le hablara"],
["de snakker med han/henne (i framtiden)", 		"le hablarán"],

["jeg skulle snakket med han/henne, men", 	"le hablaría, pero"],
["vi skulle snakket med han/henne, men", 	"le hablaríamos, pero"],
["du skulle snakket med han/henne, men", 	"le hablarías, pero"],
["dere skulle snakket med han/henne, men", 	"le hablaríais, pero"],
["han/hun skulle snakket med han/henne, men", 	"le hablaría, pero"],
["de skulle snakket med han/henne, men", 	"le hablarían, pero"],



];

let L = [];
let riktig = 0;
let feil = 0;
let index = 0;
let venterFasit = false;

const answerInput = document.getElementById("answer");

answerInput.addEventListener("keydown", e => {
    if (e.key === "Enter") checkAnswer();
});

function startGame(antall) {
    document.getElementById("levels").style.display = "none";
    document.getElementById("restartBtn").style.display = "none";
    document.getElementById("done").innerText = "";

    riktig = 0;
    feil = 0;

    L = [...allWords].sort(() => Math.random() - 0.5).slice(0, antall);

    document.getElementById("feedback").innerText = "";
    document.getElementById("stats").innerText = "";
    document.getElementById("final").innerText = "";

    nextQuestion();
}

function nextQuestion() {
    if (L.length === 0) {
        let score = Math.round(100 * riktig / (riktig + feil));
        document.getElementById("final").innerText =
            "Puntuación final: " + score + "%";
        document.getElementById("done").innerText = "¡Terminado!";
        document.getElementById("restartBtn").style.display = "block";
        return;
    }

    index = Math.floor(Math.random() * L.length);
    document.getElementById("question").innerText =
        '¿Qué significa "' + L[index][0] + '"?';

    answerInput.value = "";
    answerInput.focus();
    venterFasit = false;
}

function checkAnswer() {
    if (L.length === 0) return;

    const svar = answerInput.value.trim();
    const fasit = L[index][1];

    if (!venterFasit) {
        if (svar === fasit) {
            riktig++;
            document.getElementById("feedback").innerText = "¡Correcto!";
            L.splice(index, 1);
            nextQuestion();
        } else {
            feil++;
            document.getElementById("feedback").innerText =
                `"${fasit}" significa "${L[index][0]}".\nEscribe la respuesta correcta para continuar.`;
            answerInput.value = "";
            venterFasit = true;
        }
    } else {
        if (svar === fasit) {
            document.getElementById("feedback").innerText =
                "¡Bien! Seguimos con la siguiente palabra.";
            nextQuestion();
        } else {
            document.getElementById("feedback").innerText =
                `Debes escribir exactamente: "${fasit}"`;
            answerInput.value = "";
        }
    }

    let prosent = Math.round(100 * riktig / (riktig + feil));
    document.getElementById("stats").innerText =
        `Aciertos: ${riktig} | Errores: ${feil} | Puntuación: ${prosent}% | Restantes: ${L.length}`;
}

function restartGame() {
    document.getElementById("levels").style.display = "block";
    document.getElementById("restartBtn").style.display = "none";
    document.getElementById("done").innerText = "";

    document.getElementById("question").innerText =
        "Elige cuántas palabras";
    document.getElementById("feedback").innerText = "";
    document.getElementById("stats").innerText = "";
    document.getElementById("final").innerText = "";

    L = [];
    riktig = 0;
    feil = 0;
}
</script>

</body>
</html>
