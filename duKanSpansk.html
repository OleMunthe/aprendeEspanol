<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Hva betyr det?</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #6b0f1a; /* mørkerød */
    margin: 0;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* Ferdig-tekst øverst */
#done {
    position: absolute;
    top: -20px;        /* juster avstanden over boksen */
    left: 50%;
    transform: translateX(-50%);

    color: white;
    font-size: 48px;
    font-weight: bold;
}



/* Spill på nytt-knapp */
#restartBtn {
    position: fixed;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    font-size: 18px;
    display: none;
    z-index: 1000;
}

#box {
    position: relative; /* viktig */
    background: white;
    padding: 20px;
    max-width: 700px;
    width: 100%;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}


#levels {
    margin-bottom: 20px;
}

#levels button {
    margin-right: 10px;
    padding: 10px;
}

input {
    padding: 8px;
    width: 100%;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
}

#feedback {
    margin-top: 10px;
    font-weight: bold;
}

</style>
</head>

<body>

<header>
    <h1 id="done"></h1>
    <button id="restartBtn" onclick="restartGame()">Spill på nytt</button>
</header>

<div id="box">
    <a href="https://olemunthe.github.io/aprendeEspanol/">Gå tilbake til hovedsiden</a>



    <h2>Hva betyr ordet på norsk?</h2>
    <p>Skriv ordet på norsk og trykk Enter. Bare små bokstaver.</p>

    <p id="question"><strong>Velg antall ord for å starte</strongstrong></p>
        <div id="levels">
        <button onclick="startGame(10)">10 ord</button>
        <button onclick="startGame(20)">20 ord</button>
        <button onclick="startGame(30)">30 ord</button>
    </div>
    <input type="text" id="answer" placeholder="Ditt svar">
    <button onclick="checkAnswer()">Svar</button>

    <p id="feedback" style="color:red;"></p>
    <p id="stats"></p>
    <p id="final"></p>
</div>

<script>
let allWords = [
["klassisk","clásico"],["komisk","cómico"],["økonomisk","económico"],
["fysisk","físico"],["historisk","histórico"],["praktisk","práctico"],
["fantastisk","fantástico"],["magisk","mágico"],["politisk","político"],
["typisk","típico"],["artist","artista"],["turist","turista"],
["problem","problema"],["system","sistema"],["tema","tema"],
["klima","clima"],["maskin","máquina"],["fenomen","fonómeno"],
["farge","color"],["doktor","doctor"],["feil","error"],
["humor","humor"],["motor","motor"],["dyr","animal"],
["brutal","brutal"],["kanal","canal"],["nasjonal","nacional"],
["normal","normal"],["original","original"],["total","total"],
["ulykke","accidente"],["intelligent","inteligente"],
["pasient","paciente"],["president","presidente"],
["viktig","importante"],["relevant","relevante"]
];

let L = [];
let riktig = 0;
let feil = 0;
let index = 0;

const answerInput = document.getElementById("answer");

answerInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkAnswer();
});

function startGame(antall) {
    document.getElementById("levels").style.display = "none";
    document.getElementById("done").innerText = "";
    document.getElementById("restartBtn").style.display = "none";

    riktig = 0;
    feil = 0;

    let shuffled = [...allWords].sort(() => Math.random() - 0.5);
    L = shuffled.slice(0, antall);

    document.getElementById("feedback").innerText = "";
    document.getElementById("stats").innerText = "";
    document.getElementById("final").innerText = "";

    nextQuestion();
}

function nextQuestion() {
    if (L.length === 0) {
        let resultat = Math.round(100 * riktig / (riktig + feil));
        document.getElementById("final").innerText =
            "Din poengsum: " + resultat + "%";
        document.getElementById("done").innerText = "Ferdig!";
        document.getElementById("restartBtn").style.display = "block";
        return;
    }

    index = Math.floor(Math.random() * L.length);
    document.getElementById("question").innerText =
        'Hva betyr "' + L[index][1] + '"?';

    answerInput.value = "";
    answerInput.focus();
}

function checkAnswer() {
    if (L.length === 0) return;

    let svar = answerInput.value.trim();
    let fasit = L[index][0];

    if (svar === fasit) {
        riktig++;
        document.getElementById("feedback").innerText = "Riktig!";
        L.splice(index, 1);
    } else {
        feil++;
        document.getElementById("feedback").innerText =
            `"${L[index][1]}" betyr "${fasit}"`;
    }

    let prosent = Math.round(100 * riktig / (riktig + feil));
    document.getElementById("stats").innerText =
        `Riktig: ${riktig} | Feil: ${feil} | Poeng: ${prosent}% | Igjen: ${L.length}`;

    nextQuestion();
}

function restartGame() {
    document.getElementById("levels").style.display = "block";
    document.getElementById("restartBtn").style.display = "none";
    document.getElementById("done").innerText = "";

    document.getElementById("question").innerText =
        "Velg antall ord for å starte";
    document.getElementById("feedback").innerText = "";
    document.getElementById("stats").innerText = "";
    document.getElementById("final").innerText = "";

    L = [];
    riktig = 0;
    feil = 0;
}
</script>

</body>
</html>
