<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¿Qué significa?</title>

<style>


#layout {
    display: flex;
    align-items: center;
    gap: 30px;
}

/* Bildene på hver side */
.side-image {
    width: 180px;
    max-height: 400px;
    object-fit: contain;
}

  
body {
    font-family: Arial, sans-serif;
    background: white; /* ← endret */
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}


/* Ferdig-tekst */
#done {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 48px;
    font-weight: bold;
}

/* Restart-knapp */
#restartBtn {
    position: fixed;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    font-size: 18px;
    display: none;
    z-index: 1000;
}

#box {
    position: relative;
    background: white;
    padding: 20px;
    max-width: 700px;
    width: 100%;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

#levels {
    margin-bottom: 20px;
}

#levels button {
    margin-right: 10px;
    padding: 10px;
}

input {
    padding: 8px;
    width: 100%;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
}

#feedback {
    margin-top: 10px;
    font-weight: bold;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<header>
    <h1 id="done"></h1>
    <button id="restartBtn" onclick="restartGame()">Jugar de nuevo</button>
</header>


<div id="layout">
    <img src="yo.jpg" alt="Imagen izquierda" class="side-image">

    <div id="box">

    <a href="https://olemunthe.github.io/aprendeEspanol/">Volver a la página principal</a>

    <h2>¿Qué significa?</h2>
    
    <p>Escribe la frase en español (sin mayúsculas)</p>

    <p id="question"><strong>Elige cuántas palabras</strong></p>

    <div id="levels">
        <button onclick="startGame(10)">10 palabras</button>
        <button onclick="startGame(20)">20 palabras</button>
        <button onclick="startGame(30)">30 palabras</button>
    </div>

    <input type="text" id="answer" placeholder="Tu respuesta">
    <button onclick="checkAnswer()">Responder</button>

    <p id="feedback" style="color:red;"></p>
    <p id="stats"></p>
    <p id="final"></p>

    
</div>

    <img src="yo2.jpg" alt="Imagen derecha" class="side-image">
</div>


<script>
let allWords = [
["Jeg er overrasket", 	"estoy sorprendido"],
["Jeg død(sliten)", 	"estoy muerto"],
["Jeg er sliten/trøtt", 	"estoy cansado"],
["Jeg tenker", 		"estoy pensando"],
["Jeg er glad", 		"estoy feliz"],
["Jeg er trist", 		"estoy triste"],
["Jeg er sint", 		"estoy enfadado"],
["Jeg er kald", 		"estoy frío"],
["Jeg er varm", 		"estoy caliente"],
["Jeg er dårlig",		"estoy mal"],
["Jeg er syk", 		"estoy enfermo"],
["Jeg er sterk/hot/frisk", 	"estoy fuerte"],
["Jeg er kul", 		"estoy guay"],
["Jeg er hot/pen", 	"estoy rico"],
["Jeg er rik", 		"soy rico"],
["Jeg er forelsket", 	"estoy enamorado"],
["Jeg er enig",		"estoy de acuerdo"],
["Jeg er hjemme", 	"estoy en casa"],
["Jeg er på jobb", 	"estoy en el trabajo"],
["Jeg er på ferie", 	"estoy de vacaciones"],
["Jeg er klar", 		"estoy listo"],
["Jeg er trygg", 		"estoy seguro"],
["Jeg er hjemme", 	"estoy en casa"],
["Jeg er i byen", 		"estoy en la ciudad"],
["Jeg har ikke tid", 	"no tengo tiempo"],
["Jeg må dra", 		"tengo que ir"],
["Jeg er tørst", 		"tengo sed"],
["Jeg er sulten", 		"tengo hambre"],
["Jeg liker mat", 		"me gusta comida"],
["Jeg trenger det", 	"lo necesito"],
["Jeg ønsker det", 	"lo quiero"],
["Jeg blir",		"me quedo"],
["Jeg trenger hjelp", 	"necesito ayuda"],
["Jeg håper/jeg venter", 	"espero"],
["Jeg kan ikke", 		"no puedo"]


];

let L = [];
let riktig = 0;
let feil = 0;
let index = 0;
let venterFasit = false;

const answerInput = document.getElementById("answer");

answerInput.addEventListener("keydown", e => {
    if (e.key === "Enter") checkAnswer();
});

function startGame(antall) {
    document.getElementById("levels").style.display = "none";
    document.getElementById("restartBtn").style.display = "none";
    document.getElementById("done").innerText = "";

    riktig = 0;
    feil = 0;

    L = [...allWords].sort(() => Math.random() - 0.5).slice(0, antall);

    document.getElementById("feedback").innerText = "";
    document.getElementById("stats").innerText = "";
    document.getElementById("final").innerText = "";

    nextQuestion();
}

function nextQuestion() {
    if (L.length === 0) {
        let score = Math.round(100 * riktig / (riktig + feil));
        document.getElementById("final").innerText =
            "Puntuación final: " + score + "%";
        document.getElementById("done").innerText = "¡Terminado!";
        document.getElementById("restartBtn").style.display = "block";
        return;
    }

    index = Math.floor(Math.random() * L.length);
    document.getElementById("question").innerText =
        '¿Qué significa "' + L[index][0] + '"?';

    answerInput.value = "";
    answerInput.focus();
    venterFasit = false;
}

function checkAnswer() {
    if (L.length === 0) return;

    const svar = answerInput.value.trim();
    const fasit = L[index][1];

    if (!venterFasit) {
        if (svar === fasit) {
            riktig++;
            document.getElementById("feedback").innerText = "¡Correcto!";
            L.splice(index, 1);
            nextQuestion();
        } else {
            feil++;
            document.getElementById("feedback").innerText =
                `"${fasit}" significa "${L[index][0]}".\nEscribe la respuesta correcta para continuar.`;
            answerInput.value = "";
            venterFasit = true;
        }
    } else {
        if (svar === fasit) {
            document.getElementById("feedback").innerText =
                "¡Bien! Seguimos con la siguiente palabra.";
            nextQuestion();
        } else {
            document.getElementById("feedback").innerText =
                `Debes escribir exactamente: "${fasit}"`;
            answerInput.value = "";
        }
    }

    let prosent = Math.round(100 * riktig / (riktig + feil));
    document.getElementById("stats").innerText =
        `Aciertos: ${riktig} | Errores: ${feil} | Puntuación: ${prosent}% | Restantes: ${L.length}`;
}

function restartGame() {
    document.getElementById("levels").style.display = "block";
    document.getElementById("restartBtn").style.display = "none";
    document.getElementById("done").innerText = "";

    document.getElementById("question").innerText =
        "Elige cuántas palabras";
    document.getElementById("feedback").innerText = "";
    document.getElementById("stats").innerText = "";
    document.getElementById("final").innerText = "";

    L = [];
    riktig = 0;
    feil = 0;
}
</script>

</body>
</html>
