// Bland ordlisten
allWords.sort(() => Math.random() - 0.5);
let L = allWords.slice(0, 50);
let riktig = 0;
let feil = 0;
let index = 0;
let venterFasit = false;

const answerInput = document.getElementById("answer");
answerInput.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        checkAnswer();
    }
});

function nextQuestion() {
    if (L.length === 0) {
        let resultat = Math.round(100 * riktig / (riktig + feil));
        document.getElementById("final").innerText =
            "Tu puntuación final: " + resultat + "%";
        document.getElementById("done").innerText = "Has terminado";
        document.getElementById("question").innerText = "";
        answerInput.style.display = "none";
        return;
    }
    index = Math.floor(Math.random() * L.length);
    document.getElementById("question").innerText =
        '¿Qué significa? "' + L[index][0] + '"';
    answerInput.value = "";
    answerInput.focus();
    venterFasit = false;
}

function checkAnswer() {
    if (L.length === 0) return;
    let svar = answerInput.value.trim();
    let fasit = L[index][1];

    if (!venterFasit) {
        if (svar === fasit) {
            riktig++;
            document.getElementById("feedback").innerText = "¡Bueno!";
            L.splice(index, 1); // fjern ordet fra listen
            nextQuestion();
        } else {
            feil++;
            document.getElementById("feedback").innerText =
                `"${fasit}" significa "${L[index][0]}"\nPor favor, escribe la respuesta correcta para continuar.`;
            answerInput.value = "";
            venterFasit = true;
        }
    } else {
        // Må skrive fasiten riktig
        if (svar === fasit) {
            document.getElementById("feedback").innerText =
                `"¡Correcto! Ahora seguiremos con la siguiente palabra."`;
            nextQuestion();
        } else {
            document.getElementById("feedback").innerText =
                `Debes escribir la respuesta correcta exactamente:\n"${fasit}"`;
            answerInput.value = "";
        }
    }

    let prosent = Math.round(100 * riktig / (riktig + feil) * 10) / 10;
    document.getElementById("stats").innerText =
        `Errores: ${feil} | Correcto: ${riktig} | Puntuación: ${prosent}% | Restantes: ${L.length}`;
}
