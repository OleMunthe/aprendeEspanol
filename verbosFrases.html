<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¿Qué significa?</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #6b0f1a;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Ferdig-tekst */
#done {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 48px;
    font-weight: bold;
}

/* Restart-knapp */
#restartBtn {
    position: fixed;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    font-size: 18px;
    display: none;
    z-index: 1000;
}

#box {
    position: relative;
    background: white;
    padding: 20px;
    max-width: 700px;
    width: 100%;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

#levels {
    margin-bottom: 20px;
}

#levels button {
    margin-right: 10px;
    padding: 10px;
}

input {
    padding: 8px;
    width: 100%;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
}

#feedback {
    margin-top: 10px;
    font-weight: bold;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<header>
    <h1 id="done"></h1>
    <button id="restartBtn" onclick="restartGame()">Jugar de nuevo</button>
</header>

<div id="box">
    <a href="https://olemunthe.github.io/aprendeEspanol/">Volver a la página principal</a>

    <h2>¿Qué significa en español?</h2>
    <p>Escribe la palabra/la frase en español (sin mayúsculas)</p>

    <p id="question"><strong>Elige cuántas palabras</strong></p>

    <div id="levels">
        <button onclick="startGame(10)">10 palabras</button>
        <button onclick="startGame(20)">20 palabras</button>
        <button onclick="startGame(30)">30 palabras</button>
    </div>

    <input type="text" id="answer" placeholder="Tu respuesta">
    <button onclick="checkAnswer()">Responder</button>

    <p id="feedback" style="color:red;"></p>
    <p id="stats"></p>
    <p id="final"></p>
</div>

<script>
let allWords = [
    ["jeg snakker med han/henne", "le hablo"],
    ["vi snakker med han/henne", "le hablamos"],
    ["du snakker med han/henne", "le hablas"],
    ["dere snakker med han/henne", "le habláis"],
    ["han/hun snakker med han/henne", "le habla"],
    ["de snakker med han/henne", "le hablan"],

    ["jeg spiser brød", "como pan"],
    ["vi spiser pizza", "comemos pizza"],
    ["du spiser eplet", "comes la manzana"],
    ["dere spiser ris", "coméis arroz"],
    ["han/hun spiser kylling", "come pollo"],
    ["de spiser kaken", "comen el pastel"],

    ["liker du meg?", "te gusto"],
    ["liker du oss?", "te gustamos"],
    ["jeg liker deg", "me gustas"],
    ["jeg liker dere", "me gustáis"],
    ["jeg liker det", "me gusta"],
    ["jeg liker det (flertall)", "me gustan"],

    ["jeg prøver å forstå", "intento entender"],

    ["jeg håper på solskinn", "espero el sol"],
    ["vi håper på bedre tider", "esperamos tiempos mejores"],
    ["du håper på gode nyheter", "esperas buenas noticias"],
    ["dere håper på sol", "esperáis el sol"],
    ["han håper på en telefon", "espera una llamada"],
    ["de håper på godt vær", "esperan buen tiempo"],

    ["jeg åpner vinduet", "abro la ventana"],
    ["vi åpner butikken", "abrimos la tienda"],
    ["du åpner døra", "abres la puerta"],
    ["dere åpner kofferten", "abrís la maleta"],
    ["han/hun åpner boka", "abre el libro"],
    ["de åpner gaven", "abren el regalo"],

    ["jeg ser en film", "veo una película"],
    ["vi ser en film", "vemos una película"],
    ["du ser en film", "ves una película"],
    ["dere ser en film", "veis una película"],
    ["han/hun ser en film", "ve una película"],
    ["de ser en film", "ven una película"]
];

let L = [];
let riktig = 0;
let feil = 0;
let index = 0;
let venterFasit = false;

const answerInput = document.getElementById("answer");

answerInput.addEventListener("keydown", e => {
    if (e.key === "Enter") checkAnswer();
});

function startGame(antall) {
    document.getElementById("levels").style.display = "none";
    document.getElementById("restartBtn").style.display = "none";
    document.getElementById("done").innerText = "";

    riktig = 0;
    feil = 0;

    L = [...allWords].sort(() => Math.random() - 0.5).slice(0, antall);

    document.getElementById("feedback").innerText = "";
    document.getElementById("stats").innerText = "";
    document.getElementById("final").innerText = "";

    nextQuestion();
}

function nextQuestion() {
    if (L.length === 0) {
        let score = Math.round(100 * riktig / (riktig + feil));
        document.getElementById("final").innerText =
            "Puntuación final: " + score + "%";
        document.getElementById("done").innerText = "¡Terminado!";
        document.getElementById("restartBtn").style.display = "block";
        return;
    }

    index = Math.floor(Math.random() * L.length);
    document.getElementById("question").innerText =
        '¿Qué significa "' + L[index][0] + '"?';

    answerInput.value = "";
    answerInput.focus();
    venterFasit = false;
}

function checkAnswer() {
    if (L.length === 0) return;

    const svar = answerInput.value.trim();
    const fasit = L[index][1];

    if (!venterFasit) {
        if (svar === fasit) {
            riktig++;
            document.getElementById("feedback").innerText = "¡Correcto!";
            L.splice(index, 1);
            nextQuestion();
        } else {
            feil++;
            document.getElementById("feedback").innerText =
                `"${fasit}" significa "${L[index][0]}".\nEscribe la respuesta correcta para continuar.`;
            answerInput.value = "";
            venterFasit = true;
        }
    } else {
        if (svar === fasit) {
            document.getElementById("feedback").innerText =
                "¡Bien! Seguimos con la siguiente palabra.";
            nextQuestion();
        } else {
            document.getElementById("feedback").innerText =
                `Debes escribir exactamente: "${fasit}"`;
            answerInput.value = "";
        }
    }

    let prosent = Math.round(100 * riktig / (riktig + feil));
    document.getElementById("stats").innerText =
        `Aciertos: ${riktig} | Errores: ${feil} | Puntuación: ${prosent}% | Restantes: ${L.length}`;
}

function restartGame() {
    document.getElementById("levels").style.display = "block";
    document.getElementById("restartBtn").style.display = "none";
    document.getElementById("done").innerText = "";

    document.getElementById("question").innerText =
        "Elige cuántas palabras";
    document.getElementById("feedback").innerText = "";
    document.getElementById("stats").innerText = "";
    document.getElementById("final").innerText = "";

    L = [];
    riktig = 0;
    feil = 0;
}
</script>

</body>
</html>
