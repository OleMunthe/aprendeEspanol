<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¿Qué significa?</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: white;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Ferdig-tekst */
#done {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 48px;
    font-weight: bold;
}

/* Restart-knapp */
#restartBtn {
    position: fixed;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    font-size: 18px;
    display: none;
    z-index: 1000;
}




#box {
    position: relative;
    background: white;
    padding: 20px;
    max-width: 560px;
    width: 100%;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    z-index: 1;
}



.side-image {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 200px;
    height: auto;
    z-index: 0;
}

.side-image.left {
    left: -220px;
}


.side-image.right {
    right: -220px;
}




#levels {
    margin-bottom: 20px;
}

#levels button {
    margin-right: 10px;
    padding: 10px;
}

input {
    padding: 8px;
    width: 100%;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
}

#feedback {
    margin-top: 10px;
    font-weight: bold;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<header>
    <h1 id="done"></h1>
    <button id="restartBtn" onclick="restartGame()">Jugar de nuevo</button>
</header>

<div id="box">
    
    <img src="comer1.jpg" class="side-image left" alt="">
    <img src="comer2.jpg" class="side-image right" alt="">

    <a href="https://olemunthe.github.io/aprendeEspanol/">Volver a la página principal</a>

    <h2>¿Qué significa?</h2>
    <p>Escribe la palabra/la frase en español (sin mayúsculas)</p>

    <p id="question"><strong>Elige cuántas palabras</strong></p>

    <div id="levels">
        <button onclick="startGame(10)">10 palabras</button>
        <button onclick="startGame(20)">20 palabras</button>
        <button onclick="startGame(30)">30 palabras</button>
    </div>

    <input type="text" id="answer" placeholder="Tu respuesta">
    <button onclick="checkAnswer()">Responder</button>

    <p id="feedback" style="color:red;"></p>
    <p id="stats"></p>
    <p id="final"></p>
</div>

<script>
let allWords = [
["jeg spiser brød", 		"como pan"],
["vi spiser pizza", 		"comemos pizza"],
["du spiser eplet", 		"comes la manzana"],
["dere spiser ris", 		"coméis arroz"],
["han/hun spiser kylling", 	"come pollo"],
["de spiser kaken", 		"comen el pastel"]

  ["jeg spiste pizza (spesikt tidspunkt)", 	"comí pizza"],
["vi spiste pizza (spesikt tidspunkt)", 	"comimos pizza"],
["du spiste eplet (spesikt tidspunkt)", 	"comiste la manzana"],
["dere spiste ris (spesikt tidspunkt)", 	"comisteis arroz"],
["han/hun spiste kylling (spesikt tidspunkt)",	"comió pollo"],
["de spiste kaken (spesikt tidspunkt)", 	"comieron el pastel"]

["jeg spiste brød (pleide å spise)", 	"comía pan"],
["vi spiste pizza (pleide å spise)", 	"comíamos pizza"],
["du spiste eplet (pleide å spise)", 	"comías la manzana"],
["dere spiste ris (pleide å spise)", 	"comíais arroz"],
["han/hun spiste kylling (pleide å spise)",	"comía pollo"],
["de spiste kaken (pleide å spise)", 	"comían el pastel"]

["jeg spiser brød imorgen (i framtiden)",	"comeré pan mañana"],
["vi spiser pizza imorgen (i framtiden)", 	"comeremos pizza mañana"],
["du spiser eplet imorgen (i framtiden)", 	"comerás la manzana mañana"],
["dere spiser ris imorgen (i framtiden)", 	"comeréis arroz mañana"],
["han/hun spiser kylling imorgen (i framtiden)","comerá pollo mañana"],
["de spiser kaken imorgen (i framtiden)", 	"comerán el pastel mañana"]

["jeg skulle spist, men…", 	"yo comería, pero…"],
["vi skulle spist, men…", 		"comeríamos, pero…"],
["du skulle spist, men…", 		"comerías, pero…"],
["dere skulle spist, men…", 	"comeríais, pero…"],
["han skulle spist, men…", 	"él comería, pero…"],
["de skulle spist, men…", 		"comerían, pero…"],



];

let L = [];
let riktig = 0;
let feil = 0;
let index = 0;
let venterFasit = false;

const answerInput = document.getElementById("answer");

answerInput.addEventListener("keydown", e => {
    if (e.key === "Enter") checkAnswer();
});

function startGame(antall) {
    document.getElementById("levels").style.display = "none";
    document.getElementById("restartBtn").style.display = "none";
    document.getElementById("done").innerText = "";

    riktig = 0;
    feil = 0;

    L = [...allWords].sort(() => Math.random() - 0.5).slice(0, antall);

    document.getElementById("feedback").innerText = "";
    document.getElementById("stats").innerText = "";
    document.getElementById("final").innerText = "";

    nextQuestion();
}

function nextQuestion() {
    if (L.length === 0) {
        let score = Math.round(100 * riktig / (riktig + feil));
        document.getElementById("final").innerText =
            "Puntuación final: " + score + "%";
        document.getElementById("done").innerText = "¡Terminado!";
        document.getElementById("restartBtn").style.display = "block";
        return;
    }

    index = Math.floor(Math.random() * L.length);
    document.getElementById("question").innerText =
        '¿Qué significa "' + L[index][0] + '"?';

    answerInput.value = "";
    answerInput.focus();
    venterFasit = false;
}

function checkAnswer() {
    if (L.length === 0) return;

    const svar = answerInput.value.trim();
    const fasit = L[index][1];

    if (!venterFasit) {
        if (svar === fasit) {
            riktig++;
            document.getElementById("feedback").innerText = "¡Correcto!";
            L.splice(index, 1);
            nextQuestion();
        } else {
            feil++;
            document.getElementById("feedback").innerText =
                `"${fasit}" significa "${L[index][0]}".\nEscribe la respuesta correcta para continuar.`;
            answerInput.value = "";
            venterFasit = true;
        }
    } else {
        if (svar === fasit) {
            document.getElementById("feedback").innerText =
                "¡Bien! Seguimos con la siguiente palabra.";
            nextQuestion();
        } else {
            document.getElementById("feedback").innerText =
                `Debes escribir exactamente: "${fasit}"`;
            answerInput.value = "";
        }
    }

    let prosent = Math.round(100 * riktig / (riktig + feil));
    document.getElementById("stats").innerText =
        `Aciertos: ${riktig} | Errores: ${feil} | Puntuación: ${prosent}% | Restantes: ${L.length}`;
}

function restartGame() {
    document.getElementById("levels").style.display = "block";
    document.getElementById("restartBtn").style.display = "none";
    document.getElementById("done").innerText = "";

    document.getElementById("question").innerText =
        "Elige cuántas palabras";
    document.getElementById("feedback").innerText = "";
    document.getElementById("stats").innerText = "";
    document.getElementById("final").innerText = "";

    L = [];
    riktig = 0;
    feil = 0;
}
</script>

</body>
</html>
